<script>
  const pricing = {
    A: { 14: 43200, 30: 72000 },
    B: { 14: 36000, 30: 60000 },
    C: { 14: 30000, 30: 50000 }
  };

  let lastDefaultIsochrones = null;

  function formatPrice(value) {
    return new Intl.NumberFormat('ru-RU').format(Math.round(value)) + ' ₽';
  }

  function getTierLabel(tier) {
    if (tier === 'A') return 'Тир A';
    if (tier === 'B') return 'Тир B';
    return 'Тир C';
  }

  function getDefaultIsochrones(period) {
    if (period === 14) return 140;
    if (period === 30) return 300;
    return 0;
  }

  function syncIsochronesWithPeriod(force = false) {
    const period = parseInt(document.getElementById('period').value, 10);
    const isochronesInput = document.getElementById('isochrones');
    const newDefault = getDefaultIsochrones(period);
    const currentValueRaw = isochronesInput.value.trim();
    const currentValue = currentValueRaw === '' ? null : parseInt(currentValueRaw, 10);

    const shouldReplace =
      force ||
      currentValueRaw === '' ||
      currentValue === lastDefaultIsochrones;

    if (shouldReplace) {
      isochronesInput.value = newDefault;
    }

    lastDefaultIsochrones = newDefault;
  }

  function getScenarioCoefficient(totalScenarios) {
    if (totalScenarios === 2) return 0.25;
    if (totalScenarios === 3) return 0.475;
    if (totalScenarios === 4) return 0.7;
    return null;
  }

  function getCitiesDiscount(totalExtraCities) {
    if (totalExtraCities <= 0) return 1;
    if (totalExtraCities === 1) return 1;
    if (totalExtraCities >= 2 && totalExtraCities <= 3) return 0.9;
    if (totalExtraCities >= 4 && totalExtraCities <= 6) return 0.7;
    if (totalExtraCities >= 7 && totalExtraCities <= 10) return 0.6;
    return 0.6;
  }

  function calculateIsoPrice(extraIsochrones, period) {
    if (extraIsochrones <= 0) return 0;

    const extraPerDay = extraIsochrones / period;
    let isoRate = 0;

    if (extraPerDay >= 10 && extraPerDay < 20) {
      isoRate = 30;
    } else if (extraPerDay >= 20 && extraPerDay < 50) {
      isoRate = 20;
    } else if (extraPerDay >= 50) {
      isoRate = 10;
    } else if (extraPerDay > 0 && extraPerDay < 10) {
      isoRate = 30;
    }

    return extraIsochrones * isoRate;
  }

  function getCalculationData() {
    const cityTier = document.getElementById('cityTier').value;
    const period = parseInt(document.getElementById('period').value, 10);
    const scenarios = parseInt(document.getElementById('scenarios').value, 10) || 2;
    const rubrics = parseInt(document.getElementById('rubrics').value, 10) || 0;
    const isochrones = parseInt(document.getElementById('isochrones').value, 10) || 0;

    const extraCitiesA = parseInt(document.getElementById('extraCitiesA').value, 10) || 0;
    const extraCitiesB = parseInt(document.getElementById('extraCitiesB').value, 10) || 0;
    const extraCitiesC = parseInt(document.getElementById('extraCitiesC').value, 10) || 0;

    const safeScenarios = Math.min(5, Math.max(2, scenarios));
    const safeRubrics = Math.max(0, rubrics);
    const safeIsochrones = Math.max(0, isochrones);
    const safeExtraCitiesA = Math.max(0, extraCitiesA);
    const safeExtraCitiesB = Math.max(0, extraCitiesB);
    const safeExtraCitiesC = Math.max(0, extraCitiesC);

    const basePrice = pricing[cityTier][period];

    const includedScenarios = 2;
    const extraScenarios = Math.max(0, safeScenarios - includedScenarios);
    const scenariosPrice = basePrice * 0.35 * extraScenarios;

    const includedRubrics = 10;
    const extraRubrics = Math.max(0, safeRubrics - includedRubrics);
    let rubricsPrice = 0;

    if (extraRubrics > 0) {
      rubricsPrice = extraRubrics * 500;
      if (rubricsPrice >= 10000) {
        rubricsPrice = 10000;
      }
    }

    const includedIsochrones = 10 * period;
    const extraIsochrones = Math.max(0, safeIsochrones - includedIsochrones);
    const isoPrice = calculateIsoPrice(extraIsochrones, period);

    const totalExtraCities = safeExtraCitiesA + safeExtraCitiesB + safeExtraCitiesC;
    const scenarioCoefficient = getScenarioCoefficient(safeScenarios);
    const citiesDiscount = getCitiesDiscount(totalExtraCities);

    const rawCitiesBaseSum =
      (pricing.A[period] * safeExtraCitiesA) +
      (pricing.B[period] * safeExtraCitiesB) +
      (pricing.C[period] * safeExtraCitiesC);

    let citiesPrice = 0;
    let warningMessage = '';

    if (totalExtraCities > 0) {
      if (scenarioCoefficient === null) {
        warningMessage = 'Для расчёта дополнительных городов при 5 сценариях коэффициент не указан в документации. Поэтому доплата за города не рассчитана.';
      } else {
        citiesPrice = rawCitiesBaseSum * scenarioCoefficient * citiesDiscount;
      }
    }

    const total = basePrice + scenariosPrice + rubricsPrice + isoPrice + citiesPrice;

    return {
      cityTier,
      period,
      scenarios: safeScenarios,
      rubrics: safeRubrics,
      isochrones: safeIsochrones,
      basePrice,
      extraScenarios,
      scenariosPrice,
      extraRubrics,
      rubricsPrice,
      includedIsochrones,
      extraIsochrones,
      isoPrice,
      extraCitiesA: safeExtraCitiesA,
      extraCitiesB: safeExtraCitiesB,
      extraCitiesC: safeExtraCitiesC,
      totalExtraCities,
      scenarioCoefficient,
      citiesDiscount,
      rawCitiesBaseSum,
      citiesPrice,
      warningMessage,
      total
    };
  }

  function renderCalculation() {
    const data = getCalculationData();

    document.getElementById('basePrice').textContent = formatPrice(data.basePrice);
    document.getElementById('scenariosPrice').textContent = formatPrice(data.scenariosPrice);
    document.getElementById('rubricsPrice').textContent = formatPrice(data.rubricsPrice);
    document.getElementById('isoPrice').textContent = formatPrice(data.isoPrice);
    document.getElementById('citiesPrice').textContent = formatPrice(data.citiesPrice);
    document.getElementById('totalPrice').textContent = formatPrice(data.total);

    const warningBox = document.getElementById('warningBox');
    if (warningBox) {
      if (data.warningMessage) {
        warningBox.style.display = 'block';
        warningBox.textContent = data.warningMessage;
      } else {
        warningBox.style.display = 'none';
        warningBox.textContent = '';
      }
    }

    document.getElementById('details').innerHTML = `
      <strong>Пояснение расчёта:</strong><br>
      • База для выбранного тира и срока: ${formatPrice(data.basePrice)}<br>
      • Включено сценариев: 2, дополнительных: ${data.extraScenarios}<br>
      • Доп. сценарии: 35% от Base за каждый<br>
      • Включено рубрик: 10, дополнительных: ${data.extraRubrics}<br>
      • Доп. рубрики: 500 ₽/шт, но максимум 10 000 ₽ как категория 2-го уровня<br>
      • Включено зон доступности: ${data.includedIsochrones}<br>
      • Доп. зон доступности: ${data.extraIsochrones}<br>
      • Доп. городов Тир A: ${data.extraCitiesA}, Тир B: ${data.extraCitiesB}, Тир C: ${data.extraCitiesC}<br>
      • Всего дополнительных городов: ${data.totalExtraCities}<br>
      • Коэффициент сценариев для доп. городов: ${data.scenarioCoefficient !== null ? data.scenarioCoefficient : 'не указан в документации'}<br>
      • Скидка по количеству доп. городов: ${data.totalExtraCities > 0 ? data.citiesDiscount : 1}
    `;
  }

  async function copyCalculation() {
    const data = getCalculationData();
    const copyStatus = document.getElementById('copyStatus');

    const lines = [
      'Расчёт тарифа Base',
      `Тир основного города: ${getTierLabel(data.cityTier)}`,
      `Срок тарифа: ${data.period} дней`,
      `Количество сценариев: ${data.scenarios}`,
      `Количество рубрик: ${data.rubrics}`,
      `Количество зон доступности: ${data.isochrones}`,
      `Доп. города Тир A: ${data.extraCitiesA}`,
      `Доп. города Тир B: ${data.extraCitiesB}`,
      `Доп. города Тир C: ${data.extraCitiesC}`,
      '',
      `Базовая стоимость: ${formatPrice(data.basePrice)}`,
      `Доплата за сценарии: ${formatPrice(data.scenariosPrice)}`,
      `Доплата за рубрики: ${formatPrice(data.rubricsPrice)}`,
      `Доплата за зоны доступности: ${formatPrice(data.isoPrice)}`,
      `Доплата за дополнительные города: ${formatPrice(data.citiesPrice)}`,
      `Итого: ${formatPrice(data.total)}`
    ];

    if (data.warningMessage) {
      lines.push('', `Важно: ${data.warningMessage}`);
    }

    try {
      await navigator.clipboard.writeText(lines.join('\n'));
      copyStatus.textContent = 'Расчёт скопирован';
      setTimeout(() => {
        copyStatus.textContent = '';
      }, 2500);
    } catch (error) {
      copyStatus.textContent = 'Не удалось скопировать';
    }
  }

  document.querySelectorAll('input').forEach((el) => {
    el.addEventListener('input', renderCalculation);
  });

  document.getElementById('cityTier').addEventListener('change', renderCalculation);

  document.getElementById('period').addEventListener('change', () => {
    syncIsochronesWithPeriod(false);
    renderCalculation();
  });

  document.getElementById('copyBtn').addEventListener('click', copyCalculation);

  syncIsochronesWithPeriod(true);
  renderCalculation();
</script>
